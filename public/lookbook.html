<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive 3D Lookbook | Little to Large</title>
  <meta name="description" content="Flip through our interactive 3D family apparel catalogue and match outfits across generations.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/ux-premium.css">
  <link rel="icon" type="image/png" href="/favicon.png?v=4">
  <link rel="shortcut icon" href="/favicon.ico?v=4">
  <style>
    /* 3D Flipbook Core Styling */
    .flipbook-section {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 4rem 1rem;
      background: radial-gradient(circle, #faf8f5 0%, #f4f0e6 100%);
      min-height: 70vh;
    }

    .flipbook-container {
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 2000px; /* Gives the 3D depth effect */
      margin: 2rem 0;
    }

    .book {
      position: relative;
      width: 450px;
      height: 600px;
      transition: transform 0.5s;
      transform-style: preserve-3d;
    }

    .page {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      transform-origin: left center;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
      cursor: pointer;
    }

    .front, .back {
      position: absolute;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.1), 0 8px 25px rgba(0,0,0,0.15);
      backface-visibility: hidden; /* Hides reverse side during rotation */
      border-radius: 0 8px 8px 0;
      border: 1px solid rgba(0, 0, 0, 0.05);
    }

    .back {
      transform: rotateY(180deg);
      border-radius: 8px 0 0 8px;
    }

    /* 3D Animation Classes managed by JavaScript */
    .page.flipped {
      transform: rotateY(-180deg);
    }

    /* Controls Panel */
    .lookbook-controls {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .page-indicator {
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
      min-width: 100px;
      text-align: center;
    }

    /* Mobile Responsive Scale Overrides */
    @media (max-width: 576px) {
      .book {
        width: 320px !important;
        height: 426px !important; /* Keep the aspect ratio 3:4 */
      }
      .flipbook-section {
        padding: 2rem 0.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- Dynamic Header Injected by app.js -->
  <header></header>

  <main class="fade-slide-up">
    <!-- Intro Header -->
    <section class="container" style="margin-top: 3rem; text-align: center;">
      <span style="background-color: rgba(217, 119, 6, 0.1); color: var(--marigold); padding: 0.4rem 1.2rem; border-radius: 50px; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Interactive Catalog</span>
      <h1 style="font-size: 2.5rem; font-weight: 800; color: var(--primary); margin-top: 1rem;">Family Style Lookbook</h1>
      <p style="color: var(--text-light); max-width: 600px; margin: 0.5rem auto 0 auto;">Click or tap the pages to flip through our premium matching collections in real-time 3D.</p>
    </section>

    <!-- 3D Flipbook Arena -->
    <section class="flipbook-section">
      <div class="flipbook-container">
        <div class="book" id="book">
          <!-- Injected dynamically by API -->
          <div style="display:flex; justify-content:center; align-items:center; height:100%; color:var(--primary)">
            <i class="fas fa-spinner fa-spin" style="font-size:2rem"></i>
          </div>
        </div>
      </div>

      <!-- Controls Panel -->
      <div class="lookbook-controls" style="display:none" id="controlsPanel">
        <button class="btn btn-accent" id="prevBtn" onclick="turnPrev()" style="padding: 0.6rem 1.5rem !important; font-size: 0.85rem !important;"><i class="fas fa-chevron-left"></i> Prev</button>
        <span class="page-indicator" id="pageIndicator">Cover Page</span>
        <button class="btn btn-primary" id="nextBtn" onclick="turnNext()" style="padding: 0.6rem 1.5rem !important; font-size: 0.85rem !important;">Next <i class="fas fa-chevron-right"></i></button>
      </div>
    </section>
  </main>

  <!-- Dynamic Footer Injected by app.js -->
  <footer></footer>

  <!-- Scripts -->
  <script src="js/ux-premium.js"></script>
  <script src="js/app.js"></script>
  <script src="js/chatbot.js"></script>
  <script>
    let activePageIndex = 0;
    let pageElements = [];

    async function loadLookbook() {
      try {
        const response = await fetch('/api/lookbook');
        const data = await response.json();
        if (!data.success || !data.pages || data.pages.length === 0) {
          document.getElementById('book').innerHTML = `
            <div style="display:flex; justify-content:center; align-items:center; height:100%; color:var(--text-light)">
              <p>No pages added to lookbook catalog yet.</p>
            </div>
          `;
          return;
        }

        const bookContainer = document.getElementById('book');
        bookContainer.innerHTML = ''; // Clear spinner

        const pages = data.pages;
        const totalSheets = Math.ceil(pages.length / 2);
        
        for (let i = 0; i < totalSheets; i++) {
          const frontPage = pages[i * 2];
          const backPage = pages[i * 2 + 1];

          const pageDiv = document.createElement('div');
          pageDiv.className = 'page';
          const pageNum = i + 1;
          pageDiv.setAttribute('onclick', `flipPage(this, ${pageNum})`);

          // Front Face
          const frontDiv = document.createElement('div');
          frontDiv.className = 'front';
          frontDiv.style.backgroundImage = `url('${frontPage.image_url}')`;
          frontDiv.style.backgroundColor = '#faf7f2';
          pageDiv.appendChild(frontDiv);

          // Back Face
          const backDiv = document.createElement('div');
          backDiv.className = 'back';
          if (backPage) {
            backDiv.style.backgroundImage = `url('${backPage.image_url}')`;
            backDiv.style.backgroundColor = '#faf7f2';
          } else {
            // Default back cover fallback if odd pages
            backDiv.style.backgroundColor = '#f6f3ea';
            backDiv.style.display = 'flex';
            backDiv.style.alignItems = 'center';
            backDiv.style.justifyContent = 'center';
            backDiv.innerHTML = `
              <div style="text-align: center; color: #3d2327; padding: 2rem;">
                <h2 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem;">LITTLE TO LARGE</h2>
                <p style="font-size: 0.8rem; letter-spacing: 1px; color: var(--marigold); font-weight: 700;">www.littletolarge.in</p>
              </div>
            `;
          }
          pageDiv.appendChild(backDiv);
          bookContainer.appendChild(pageDiv);
        }

        // Setup page references
        pageElements = document.querySelectorAll('.page');
        setupDynamicZIndex();
        
        // Show controls
        document.getElementById('controlsPanel').style.display = 'flex';
        updateIndicator();

      } catch (err) {
        console.error('Failed to load lookbook catalog:', err);
      }
    }

    function setupDynamicZIndex() {
      pageElements.forEach((page, index) => {
        page.style.zIndex = pageElements.length - index;
      });
    }

    function updateIndicator() {
      const indicator = document.getElementById('pageIndicator');
      if (pageElements.length === 0) return;
      
      if (activePageIndex === 0) {
        indicator.textContent = 'Cover Page';
      } else if (activePageIndex === pageElements.length) {
        indicator.textContent = 'Back Cover';
      } else {
        indicator.textContent = `Page ${activePageIndex} of ${pageElements.length - 1}`;
      }
    }

    function flipPage(pageElement, pageNum) {
      if (!pageElement.classList.contains('flipped')) {
        // Turning forward
        pageElement.classList.add('flipped');
        pageElement.style.zIndex = pageNum;
        activePageIndex = pageNum;
      } else {
        // Turning backward
        pageElement.classList.remove('flipped');
        pageElement.style.zIndex = pageElements.length - pageNum + 1;
        activePageIndex = pageNum - 1;
      }
      updateIndicator();
    }

    function turnNext() {
      if (activePageIndex < pageElements.length) {
        const targetPage = pageElements[activePageIndex];
        flipPage(targetPage, activePageIndex + 1);
      }
    }

    function turnPrev() {
      if (activePageIndex > 0) {
        const targetPage = pageElements[activePageIndex - 1];
        flipPage(targetPage, activePageIndex);
      }
    }

    // Load lookbook pages from API on start
    window.addEventListener('DOMContentLoaded', loadLookbook);
  </script>
</body>
</html>
